version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cras_postgres
    restart: always
    environment:
      POSTGRES_DB: cras_erp
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cras_network

  backend:
    build: .
    container_name: cras_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Conexão com o banco (O nome 'db' é o nome do serviço acima)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cras_erp
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Substitua os endereços abaixo pelos links reais do seu Front na Vercel
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://front-projeto-ts-react.vercel.app
    networks:
      - cras_network

volumes:
  postgres_data:

networks:
  cras_network:
    driver: bridge
