# PostgreSQL Database settings for Production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL Auto (update for initial deployment, later switch to validate/flyway)
spring.jpa.hibernate.ddl-auto=update

# Disable open-in-view
spring.jpa.open-in-view=false

# CORS - Adicione a URL do seu frontend no Render como variável de ambiente CORS_ALLOWED_ORIGINS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

