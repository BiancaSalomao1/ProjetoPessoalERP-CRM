# Nome da aplicacao
spring.application.name=ProjetoPessoal

# Configuração do Profile Ativo (Default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configurações globais do servidor
server.port=8080

# Configurações globais do JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Pool de conexões (Hikari)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Configurações de E-mail (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER_NAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
